name: Update Data from ObsidianNote

on:
  repository_dispatch:
    types: [obsidian-notes-updated]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动刷新

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web-viewer
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download ObsidianNote articles
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node scripts/download-articles.js

      - name: Build data
        env:
          VAULT_PATH: ${{ github.workspace }}/reference
        run: node scripts/build-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update data from ObsidianNote"
            git push
          fi
