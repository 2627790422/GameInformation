name: Update Data from ObsidianNote

on:
  repository_dispatch:
    types: [obsidian-notes-updated]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动刷新

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web-viewer
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Clone ObsidianNote (sparse-checkout)
        run: |
          rm -rf reference
          git clone --filter=blob:none --no-checkout --depth 1 https://github.com/2627790422/ObsidianNote.git reference
          cd reference
          git sparse-checkout init --cone
          git sparse-checkout set \
            "游戏设计/游戏资讯/资讯" \
            "游戏设计/游戏跟踪/已分析" \
            "游戏设计/自主采集/拆解/拆解结果" \
            "AI/AI资讯"
          git checkout

      - name: Build data
        run: node scripts/build-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update data from ObsidianNote"
            git push
          fi
