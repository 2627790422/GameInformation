name: Update Data from ObsidianNote

on:
  repository_dispatch:
    types: [obsidian-notes-updated]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动刷新

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web-viewer
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download ObsidianNote articles
        run: |
          rm -rf reference && mkdir -p reference

          # 一次 API 调用获取全仓库文件树
          echo "=== Fetching file tree from GitHub ==="
          gh api "repos/2627790422/ObsidianNote/git/trees/HEAD?recursive=1" \
            --jq '.tree[] | select(.type=="blob" and (.path | endswith(".md"))) | .path' \
            > /tmp/files.txt
          echo "  Total .md files: $(wc -l < /tmp/files.txt)"

          # 只下载 4 个目标目录下的 .md 文件（走 raw.githubusercontent.com 不限速）
          count=0
          TARGETS=("游戏设计/游戏资讯/资讯" "游戏设计/游戏跟踪/已分析" "游戏设计/自主采集/拆解/拆解结果" "AI/AI资讯")

          while read -r fpath; do
            for prefix in "${TARGETS[@]}"; do
              if echo "$fpath" | grep -q "^${prefix}/"; then
                mkdir -p "reference/$(dirname "$fpath")"
                curl -sL "https://raw.githubusercontent.com/2627790422/ObsidianNote/main/$fpath" -o "reference/$fpath"
                count=$((count + 1))
                break
              fi
            done
          done < /tmp/files.txt
          echo "=== Downloaded $count articles ==="

      - name: Build data
        run: node scripts/build-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update data from ObsidianNote"
            git push
          fi
