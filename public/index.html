<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏资讯 · Game Research Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>

  <!-- Masthead -->
  <header class="site-head">
    <div class="head-inner">
      <a class="brand" href="#" id="homeBtn">
        <span class="brand-cn">游 戏 资 讯</span>
        <span class="brand-en">Game Research Archive</span>
      </a>
      <div class="masthead-meta" id="mastheadMeta"></div>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-field" placeholder="搜索文章&hellip;" autocomplete="off">
      <div class="search-drop" id="searchDropdown"></div>
    </div>
    <button class="tool-btn" id="themeToggle" title="切换主题" aria-label="切换亮暗主题">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
    </button>
  </div>

  <!-- Filters -->
  <nav class="filter-strip">
    <div class="filter-row">
      <span class="filter-label">分类</span>
      <button class="f-chip active" data-key="pipeline" data-value="">全部</button>
      <button class="f-chip" data-key="pipeline" data-value="微信资讯">游戏资讯</button>
      <button class="f-chip" data-key="pipeline" data-value="游戏跟踪">游戏跟踪</button>
      <button class="f-chip" data-key="pipeline" data-value="自主采集">游戏拆解</button>
      <button class="f-chip" data-key="pipeline" data-value="AI资讯">AI资讯</button>
    </div>
    <div class="filter-row" id="monthFilters">
      <span class="filter-label">月份</span>
      <button class="f-chip active" data-key="month" data-value="">全部</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main-wrap">

    <!-- Timeline View -->
    <section id="timelineView" class="view active">
      <div class="feed-meta">
        <span id="articleCount"></span>
        <span style="float:right">
          <a href="#s" class="stats-link">统计 &rarr;</a>
        </span>
      </div>
      <div class="card-grid" id="timeline"></div>
      <div class="blank-slate" id="emptyState">
        <p class="blank-icon">&mdash;</p>
        <p class="blank-msg">没有找到匹配的文章</p>
        <p class="blank-sub">试试调整筛选条件或更换搜索关键词</p>
      </div>
    </section>

    <!-- Detail View -->
    <section id="detailView" class="view">
      <button class="nav-back" id="backBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回列表
      </button>
      <article id="articleDetail"></article>
    </section>

    <!-- Stats View -->
    <section id="statsView" class="view">
      <button class="nav-back" id="statsBackBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回列表
      </button>
      <div id="statsPanel"></div>
    </section>

  </main>

  <div class="snack" id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
