<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顶尖资讯 · Top Consulting Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>

  <!-- Module Toggle — top of page -->
  <nav class="module-toggle" id="moduleToggle">
    <div class="mt-trigger">
      <span class="mt-current">A I</span>
      <span class="mt-arrow">▾</span>
    </div>
    <div class="mt-panel">
      <button class="mt-btn" data-module="games">游 戏</button>
      <button class="mt-btn active" data-module="ai">A I</button>
    </div>
  </nav>

  <!-- Masthead -->
  <header class="site-head">
    <div class="head-inner">
      <a class="brand" href="#" id="homeBtn">
        <span class="brand-cn">顶 尖 资 讯</span>
        <span class="brand-en">Top Consulting Archive</span>
      </a>
      <div class="masthead-meta" id="mastheadMeta"></div>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-field" placeholder="搜索文章&hellip;" autocomplete="off">
      <div class="search-drop" id="searchDropdown"></div>
    </div>
    <div class="toolbar-right">
      <div class="user-menu" id="userMenu">
        <button class="tool-btn" id="authBtn" title="登录" aria-label="登录">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <div class="user-drop" id="userDrop" style="display:none">
          <button class="user-drop-item" id="userNameDisplay"></button>
          <button class="user-drop-item" data-action="profile">个人中心</button>
          <button class="user-drop-item" data-action="bookmarks">我的收藏</button>
          <hr class="user-drop-divider">
          <button class="user-drop-item" data-action="signout">退出登录</button>
        </div>
      </div>
      <button class="tool-btn" id="themeToggle" title="切换主题" aria-label="切换亮暗主题">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
    </button>
    </div>
  </div>

  <!-- Sub Filters (dynamic, per-module) -->
  <nav class="filter-strip" id="filterStrip">
    <div class="filter-row" id="filterChips">
      <!-- Populated by JS -->
    </div>
  </nav>

  <!-- Main -->
  <main class="main-wrap">

    <!-- Timeline View -->
    <section id="timelineView" class="view active">
      <div class="feed-meta">
        <span id="articleCount"></span>
        <span style="float:right">
          <a href="#s" class="stats-link">统计 &rarr;</a>
        </span>
      </div>
      <div class="card-grid" id="timeline"></div>
      <div class="blank-slate" id="emptyState">
        <p class="blank-icon">&mdash;</p>
        <p class="blank-msg">没有找到匹配的文章</p>
        <p class="blank-sub">试试调整筛选条件或更换搜索关键词</p>
      </div>
    </section>

    <!-- Detail View -->
    <section id="detailView" class="view">
      <button class="nav-back" id="backBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回列表
      </button>
      <article id="articleDetail"></article>
    </section>

    <!-- Stats View -->
    <section id="statsView" class="view">
      <button class="nav-back" id="statsBackBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回列表
      </button>
      <div id="statsPanel"></div>
    </section>

    <!-- Profile View -->
    <section id="profileView" class="view">
      <button class="nav-back" id="profileBackBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回列表
      </button>
      <div id="profilePanel"></div>
    </section>

    <!-- Bookmarks View -->
    <section id="bookmarksView" class="view">
      <button class="nav-back" id="bookmarksBackBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回列表
      </button>
      <div class="feed-meta" id="bookmarkCount"></div>
      <div class="card-grid" id="bookmarkGrid"></div>
      <div class="blank-slate" id="bookmarkEmpty">
        <p class="blank-icon">&mdash;</p>
        <p class="blank-msg">还没有收藏文章</p>
        <p class="blank-sub">浏览文章时点击星标即可收藏</p>
      </div>
    </section>

  </main>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal" style="display:none">
    <div class="modal-card">
      <button class="modal-close" id="authModalClose">&times;</button>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>
      <form id="authForm" class="auth-form">
        <div class="auth-field">
          <label for="authEmail">邮箱</label>
          <input type="email" id="authEmail" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="authPassword">密码</label>
          <input type="password" id="authPassword" placeholder="至少 6 位" required minlength="6" autocomplete="current-password">
        </div>
        <div class="auth-field" id="authNameField" style="display:none">
          <label for="authName">昵称</label>
          <input type="text" id="authName" placeholder="如何称呼你" autocomplete="name">
        </div>
        <p class="auth-error" id="authError"></p>
        <button type="submit" class="auth-submit" id="authSubmit">登录</button>
      </form>
      <p class="auth-switch" id="authSwitch">
        还没有账号？<button type="button" class="link-btn" data-tab="register">立即注册</button>
      </p>
    </div>
  </div>

  <div class="snack" id="toast"></div>

  <script src="/auth.js"></script>
  <script src="/app.js"></script>
</body>
</html>
